name: Healthcare App CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: |
        cd ~/healthcare-deployment
        sudo docker build -t healthcare-app .

    - name: Stop Old Container
      run: |
        sudo docker stop healthcare-container || true
        sudo docker rm healthcare-container || true

    - name: Run New Container
      run: |
        sudo docker run -d \
        --name healthcare-container \
        -p 5000:5000 \
        healthcare-app

