<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Healthcare+</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            background:#f4f8fb;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
            overflow-x:hidden;
        }

        .register-card{
            width:100%;
            max-width:520px;
            background:rgba(255,255,255,0.75);
            backdrop-filter:blur(12px);
            border-radius:30px;
            padding:45px;
            box-shadow:0 15px 40px rgba(0,0,0,0.06);
            border:1px solid rgba(255,255,255,0.4);
        }

        .brand{
            font-size:32px;
            font-weight:700;
            color:#0d6efd;
            text-align:center;
            margin-bottom:10px;
        }

        .register-title{
            text-align:center;
            margin-bottom:35px;
        }

        .register-title h1{
            font-size:38px;
            font-weight:700;
            color:#1e293b;
        }

        .register-title p{
            margin-top:10px;
            color:#64748b;
        }

        .form-control{
            height:58px;
            border-radius:14px;
            border:1px solid #dbe4ee;
            padding-left:16px;
            margin-bottom:20px;
            font-size:15px;
        }

        .form-control:focus{
            box-shadow:none;
            border-color:#0d6efd;
        }

        .register-btn{
            width:100%;
            height:58px;
            border:none;
            border-radius:14px;
            background:#0d6efd;
            color:white;
            font-weight:600;
            transition:0.3s ease;
            box-shadow:0 8px 20px rgba(13,110,253,0.25);
        }

        .register-btn:hover{
            transform:translateY(-3px);
            box-shadow:0 12px 25px rgba(13,110,253,0.35);
        }

        .login-link{
            margin-top:25px;
            text-align:center;
            color:#64748b;
        }

        .login-link a{
            color:#0d6efd;
            text-decoration:none;
            font-weight:600;
        }

        @media(max-width:576px){

            .register-card{
                padding:30px 22px;
                border-radius:24px;
            }

            .brand{
                font-size:28px;
            }

            .register-title h1{
                font-size:32px;
            }

        }

    </style>
</head>

<body>

    <div class="register-card">

        <div class="brand">
            Healthcare+
        </div>

        <div class="register-title">

            <h1>Create Account</h1>

            <p>
                Register to book and manage appointments easily.
            </p>

        </div>

        <form method="POST">

            <input 
                type="text"
                class="form-control"
                placeholder="Full Name"
                name="fullname"
                required
            >

            <input 
                type="email"
                class="form-control"
                placeholder="Email Address"
                name="email"
                required
            >

            <input 
                type="password"
                class="form-control"
                placeholder="Password"
                name="password"
                minlength="8"
                required
            >

            <button class="register-btn">
                Create Account
            </button>

        </form>

        <div class="login-link">

            Already have an account?
            <a href="/login">
                Login
            </a>

        </div>

    </div>

</body>
</html>
