<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Records - Healthcare+</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            background:#f4f8fb;
        }

        /* Navbar */

        .navbar{
            background:rgba(255,255,255,0.9);
            backdrop-filter:blur(12px);
            padding:18px 0;
            box-shadow:0 5px 20px rgba(0,0,0,0.04);

            position:fixed;
            top:0;
            width:100%;
            z-index:1000;
        }

        .navbar-brand{
            font-size:28px;
            font-weight:700;
            color:#0d6efd !important;
        }

        .nav-link{
            color:#1e293b;
            font-weight:500;
            margin-left:15px;
            position:relative;
            transition:0.3s ease;
            padding:6px 12px;
            border-radius:10px;
        }

        .nav-link::before{
            content:'';
            position:absolute;
            inset:0;
            background:rgba(13,110,253,0.08);
            border-radius:10px;

            transform:scale(0.7);
            opacity:0;

            transition:0.3s ease;

            z-index:-1;
        }

        .nav-link:hover{
            color:#0d6efd;
            transform:translateY(-2px);
        }

        .nav-link:hover::before{
            transform:scale(1);
            opacity:1;
        }

        /* Records Section */

        .records-section{
            padding:140px 0 60px;
        }

        .section-title{
            margin-bottom:40px;
        }

        .section-title h1{
            font-size:42px;
            font-weight:700;
            color:#1e293b;
        }

        .section-title p{
            color:#64748b;
            margin-top:10px;
        }

        /* Record Cards */

        .record-card{
            background:rgba(255,255,255,0.75);
            backdrop-filter:blur(12px);
            padding:30px;
            border-radius:24px;
            box-shadow:0 10px 30px rgba(0,0,0,0.06);
            margin-bottom:25px;
            transition:0.3s ease;
        }

        .record-card:hover{
            transform:translateY(-5px);
            box-shadow:0 18px 40px rgba(0,0,0,0.1);
        }

        .record-card h3{
            color:#0d6efd;
            font-weight:600;
            margin-bottom:15px;
        }

        .record-card p{
            margin-bottom:10px;
            color:#475569;
        }

        .record-card span{
            font-weight:600;
            color:#1e293b;
        }

    </style>
</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg">

        <div class="container">

            <a class="navbar-brand" href="/dashboard">
                Healthcare+
            </a>

            <button 
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
            >
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">
                            Dashboard
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/appointment">
                            Appointments
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/notifications">
                            Notifications
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/profile">
                            Profile
                        </a>
                    </li>

                    <li class="nav-item ms-2">
                        <a class="btn btn-outline-primary rounded-pill px-4" href="/logout">
                            Logout
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- Records Section -->

    <section class="records-section">

        <div class="container">

            <div class="section-title">

                <h1>
                    Medical Records
                </h1>

                <p>
                    View your healthcare diagnoses and prescriptions.
                </p>

            </div>

            <!-- Dynamic Records -->

            {% for record in records %}

            <div class="record-card">

                <h3>
                    {{ record[2] }}
                </h3>

                <p>
                    <span>Diagnosis:</span>
                    {{ record[3] }}
                </p>

                <p>
                    <span>Prescription:</span>
                    {{ record[4] }}
                </p>

                <p>
                    <span>Visit Date:</span>
                    {{ record[5] }}
                </p>

            </div>

            {% endfor %}

        </div>

    </section>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
