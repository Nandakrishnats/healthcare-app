<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Doctor - Healthcare+ Admin</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            background:#f4f8fb;
        }

        /* Navbar */

        .navbar{
            background:rgba(255,255,255,0.9);
            backdrop-filter:blur(12px);
            padding:18px 0;
            box-shadow:0 5px 20px rgba(0,0,0,0.04);

            position:fixed;
            top:0;
            width:100%;
            z-index:1000;
        }

        .navbar-brand{
            font-size:28px;
            font-weight:700;
            color:#0d6efd !important;
        }

        /* Section */

        .doctor-section{
            padding:140px 0 60px;
        }

        .doctor-card{
            background:rgba(255,255,255,0.8);
            backdrop-filter:blur(12px);
            border-radius:28px;
            padding:40px;
            box-shadow:0 10px 30px rgba(0,0,0,0.06);

            max-width:700px;
            margin:auto;
        }

        .doctor-card h1{
            font-size:38px;
            font-weight:700;
            color:#1e293b;
            margin-bottom:10px;
        }

        .doctor-card p{
            color:#64748b;
            margin-bottom:30px;
        }

        .form-label{
            font-weight:500;
            color:#1e293b;
            margin-bottom:10px;
        }

        .form-control{
            border-radius:14px;
            padding:14px;
            border:1px solid #dbeafe;
            margin-bottom:20px;
        }

        .btn-primary{
            border-radius:14px;
            padding:12px;
            font-weight:600;
        }

    </style>
</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg">

        <div class="container">

            <a class="navbar-brand" href="/admin">
                Healthcare+ Admin
            </a>

            <div class="ms-auto">

                <a 
                    class="btn btn-outline-primary rounded-pill px-4"
                    href="/logout"
                >
                    Logout
                </a>

            </div>

        </div>

    </nav>

    <!-- Section -->

    <section class="doctor-section">

        <div class="container">

            <div class="doctor-card">

                <h1>
                    Add Doctor
                </h1>

                <p>
                    Add healthcare specialists to the platform.
                </p>

                <form method="POST">

                    <label class="form-label">
                        Doctor Name
                    </label>

                    <input 
                        type="text"
                        name="doctor_name"
                        class="form-control"
                        placeholder="Enter doctor name"
                        required
                    >

                    <label class="form-label">
                        Specialization
                    </label>

                    <input 
                        type="text"
                        name="specialization"
                        class="form-control"
                        placeholder="Enter specialization"
                        required
                    >

                    <label class="form-label">
                        Experience
                    </label>

                    <input 
                        type="text"
                        name="experience"
                        class="form-control"
                        placeholder="Example: 10 Years"
                        required
                    >

                    <label class="form-label">
                        Availability
                    </label>

                    <input 
                        type="text"
                        name="availability"
                        class="form-control"
                        placeholder="Example: Mon - Fri"
                        required
                    >

                    <button 
                        type="submit"
                        class="btn btn-primary w-100 mt-3"
                    >
                        Add Doctor
                    </button>

                </form>

            </div>

        </div>

    </section>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
