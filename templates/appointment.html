<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - Healthcare+</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            background:#f4f8fb;
        }

        /* Fixed Navbar */

        .navbar{
            background:rgba(255,255,255,0.9);
            backdrop-filter:blur(12px);
            padding:18px 0;
            box-shadow:0 5px 20px rgba(0,0,0,0.04);

            position:fixed;
            top:0;
            width:100%;
            z-index:1000;
        }

        .navbar-brand{
            font-size:28px;
            font-weight:700;
            color:#0d6efd !important;
        }

        /* Navbar Hover Animation */

        .nav-link{
            color:#1e293b;
            font-weight:500;
            margin-left:15px;
            position:relative;
            transition:0.3s ease;
            padding:6px 12px;
            border-radius:10px;
        }

        .nav-link::before{
            content:'';
            position:absolute;
            inset:0;
            background:rgba(13,110,253,0.08);
            border-radius:10px;

            transform:scale(0.7);
            opacity:0;

            transition:0.3s ease;

            z-index:-1;
        }

        .nav-link:hover{
            color:#0d6efd;
            transform:translateY(-2px);
        }

        .nav-link:hover::before{
            transform:scale(1);
            opacity:1;
        }

        /* Appointment Section */

        .appointment-section{
            padding:140px 0 60px;
        }

        .appointment-card{
            background:rgba(255,255,255,0.75);
            backdrop-filter:blur(12px);
            padding:45px;
            border-radius:30px;
            box-shadow:0 10px 30px rgba(0,0,0,0.06);
        }

        .appointment-title{
            text-align:center;
            margin-bottom:35px;
        }

        .appointment-title h1{
            font-size:40px;
            font-weight:700;
            color:#1e293b;
        }

        .appointment-title p{
            color:#64748b;
            margin-top:10px;
        }

        .form-control,
        .form-select{
            height:58px;
            border-radius:14px;
            border:1px solid #dbe4ee;
            margin-bottom:20px;
        }

        textarea.form-control{
            height:130px;
            resize:none;
            padding-top:15px;
        }

        .form-control:focus,
        .form-select:focus{
            box-shadow:none;
            border-color:#0d6efd;
        }

        .appointment-btn{
            width:100%;
            height:58px;
            border:none;
            border-radius:14px;
            background:#0d6efd;
            color:white;
            font-weight:600;
            transition:0.3s ease;
            box-shadow:0 8px 20px rgba(13,110,253,0.25);
        }

        .appointment-btn:hover{
            transform:translateY(-3px);
            box-shadow:0 12px 25px rgba(13,110,253,0.35);
        }

        @media(max-width:576px){

            .appointment-card{
                padding:30px 22px;
            }

            .appointment-title h1{
                font-size:32px;
            }

        }

    </style>
</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg">

        <div class="container">

            <a class="navbar-brand" href="#">
                Healthcare+
            </a>

            <button 
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
            >
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">
                            Dashboard
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/history">
                            Appointments
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/notifications">
                            Notifications
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/profile">
                            Profile
                        </a>
                    </li>

                    <li class="nav-item ms-2">
                        <a class="btn btn-outline-primary rounded-pill px-4" href="/logout">
                            Logout
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- Appointment Section -->

    <section class="appointment-section">

        <div class="container">

            <div class="appointment-card">

                <div class="appointment-title">

                    <h1>
                        Book Appointment
                    </h1>

                    <p>
                        Schedule your healthcare appointment easily.
                    </p>

                </div>

                <form method="POST">

                    <input 
                        type="text"
                        class="form-control"
                        placeholder="Patient Name"
                        name="patient_name"
                        required
                    >

                    <select class="form-select" name="doctor_name" required>

                        <option value="" selected disabled>
                            Select Doctor
                        </option>

                        {% for doctor in doctors %}

                        <option value="{{ doctor[1] }}">
                            {{ doctor[1] }} - {{ doctor[2] }}
                        </option>

                        {% endfor %}

                    </select>

                    <input 
                        type="date"
                        class="form-control"
                        name="appointment_date"
                        required
                    >

                    <input 
                        type="time"
                        class="form-control"
                        name="appointment_time"
                        required
                    >

                    <textarea 
                        class="form-control"
                        placeholder="Describe symptoms or reason for appointment"
                        name="symptoms"
                        required
                    ></textarea>

                    <button class="appointment-btn">
                        Confirm Appointment
                    </button>

                </form>

            </div>

        </div>

    </section>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
