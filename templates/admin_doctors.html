<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Doctors - Healthcare+ Admin</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            background:#f4f8fb;
        }

        /* Navbar */

        .navbar{
            background:rgba(255,255,255,0.9);
            backdrop-filter:blur(12px);
            padding:18px 0;
            box-shadow:0 5px 20px rgba(0,0,0,0.04);

            position:fixed;
            top:0;
            width:100%;
            z-index:1000;
        }

        .navbar-brand{
            font-size:28px;
            font-weight:700;
            color:#0d6efd !important;
        }

        /* Section */

        .doctors-section{
            padding:140px 0 60px;
        }

        .section-title{
            margin-bottom:40px;
        }

        .section-title h1{
            font-size:42px;
            font-weight:700;
            color:#1e293b;
        }

        .section-title p{
            color:#64748b;
            margin-top:10px;
        }

        /* Table */

        .table-container{
            background:rgba(255,255,255,0.8);
            backdrop-filter:blur(12px);
            border-radius:24px;
            padding:30px;
            box-shadow:0 10px 30px rgba(0,0,0,0.06);

            overflow-x:auto;
        }

        .table{
            margin-bottom:0;
        }

        .table thead{
            background:#0d6efd;
            color:white;
        }

        .table th{
            padding:18px;
            border:none;
            white-space:nowrap;
        }

        .table td{
            padding:18px;
            vertical-align:middle;
            color:#475569;
        }

        .table tbody tr:hover{
            background:#f1f5f9;
        }

        .add-btn{
            border-radius:14px;
            padding:12px 24px;
            font-weight:600;
        }

    </style>
</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg">

        <div class="container">

            <a class="navbar-brand" href="/admin">
                Healthcare+ Admin
            </a>

            <div class="ms-auto">

                <a 
                    href="/admin/add_doctor"
                    class="btn btn-primary rounded-pill px-4 me-2"
                >
                    Add Doctor
                </a>

                <a 
                    href="/logout"
                    class="btn btn-outline-primary rounded-pill px-4"
                >
                    Logout
                </a>

            </div>

        </div>

    </nav>

    <!-- Section -->

    <section class="doctors-section">

        <div class="container">

            <div class="section-title">

                <h1>
                    Manage Doctors
                </h1>

                <p>
                    Monitor and manage healthcare specialists across the platform.
                </p>

            </div>

            <div class="table-container">

                <table class="table">

                    <thead>

                        <tr>
                            <th>Doctor Name</th>
                            <th>Specialization</th>
                            <th>Experience</th>
                            <th>Availability</th>
                        </tr>

                    </thead>

                    <tbody>

                        {% for doctor in doctors %}

                        <tr>

                            <td>
                                {{ doctor[1] }}
                            </td>

                            <td>
                                {{ doctor[2] }}
                            </td>

                            <td>
                                {{ doctor[3] }}
                            </td>

                            <td>
                                {{ doctor[4] }}
                            </td>

                        </tr>

                        {% endfor %}

                    </tbody>

                </table>

            </div>

        </div>

    </section>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
